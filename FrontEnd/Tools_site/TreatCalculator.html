<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="TCstyle.css">
    <title>Treat calculator</title>
    <nav class="navbar">
        <img src="../images/logo.png" class="logo">
        <h1 class="logo_text">BSS TOOLS</h1>
    </nav>
</head>
<body class="abc">
    <script src="../../BackEnd/TreatCalculator.js"></script>

    <div class="calculate_info">
        <div>
            <label for="bees">Insert your bees</label>
            <br>
            <input type="number" placeholder="Insert your total hive slot" id="bees">
            <br>
            <label for="beeslevels">Insert your bees levels</label>
            <br>
            <input type="number" placeholder="Insert your bees levels" id="beeslevels">
            <br>
            <label for="bond_from_treat">Bond from treat (+20% if you have a gifted puppy):</label>
            <br>
            <input type="number" placeholder="Insert your %bond from treat" id="bond_from_treat_bonus">
            <br>
        </div>
        <button id="calculate_treat_btn" onclick="calculateTreat()">test</button>
    </div>
    <div class="text_div1">
        <p id="Up_treat" class="p1">Treats for up your bees: </p>
        <br>
        <br>
        <p id="Up_honey" class="p1">Honey for up your bees: </p>
    </div>
    
</body>
